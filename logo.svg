<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="cyber-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="50%" stop-color="#7000ff" />
      <stop offset="100%" stop-color="#ff00ff" />
    </linearGradient>
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Outer glowing hexagon -->
  <polygon points="50,8 88,30 88,70 50,92 12,70 12,30" 
           fill="none" 
           stroke="url(#cyber-grad)" 
           stroke-width="4.5" 
           filter="url(#neon-glow)" />
  <!-- Circuit grid dot accents -->
  <circle cx="50" cy="8" r="3.5" fill="#00f0ff" />
  <circle cx="88" cy="30" r="3.5" fill="#ff00ff" />
  <circle cx="12" cy="70" r="3.5" fill="#00f0ff" />
  <circle cx="50" cy="92" r="3.5" fill="#ff00ff" />
  <!-- Stylized geometric cyber 'S' monogram -->
  <path d="M 62 30 
           L 42 30 
           A 10 10 0 0 0 35 45 
           L 55 45 
           A 10 10 0 0 1 65 60 
           L 45 60 
           A 10 10 0 0 1 38 52" 
        fill="none" 
        stroke="url(#cyber-grad)" 
        stroke-width="7.5" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#neon-glow)" />
</svg>
